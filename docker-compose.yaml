services:
  mongodb:
    container_name: mongodb
    image: maheshbabu22neeli/mongodb:1.0.0
    build: ./mongodb

  redis:
    container_name: redis
    image: redis:7.0

  catalogue:
    container_name: catalogue
    image: maheshbabu22neeli/catalogue:1.0.0
    build: ./catalogue
    depends_on:
      - mongodb

  user:
    container_name: user
    image: maheshbabu22neeli/user:1.0.0
    build: ./user
    depends_on:
    - redis

  cart:
    container_name: cart
    image: maheshbabu22neeli/cart:1.0.0
    build: ./cart
    depends_on:
    - redis

  frontend:
    container_name: frontend
    image: maheshbabu22neeli/frontend:1.0.0
    build: ./frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user
    - cart




networks:
  default:
    name: roboshop
    driver: bridge
    external: false # we are creating this network manually, so we set this to false
